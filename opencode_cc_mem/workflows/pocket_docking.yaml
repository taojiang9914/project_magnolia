name: pocket_docking
description: Pocket-guided docking workflow
steps:
  - name: predict_pockets
    tool: p2rank_predict
    gate: at_least_one_pocket
    outputs: [predictions.csv]
  - name: dock
    tool: haddock3_run
    gate: docking_inputs_ready
    depends_on: [predict_pockets]
    outputs: [output/]
